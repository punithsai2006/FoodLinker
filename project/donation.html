<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donate Food</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    header {
      background-color: #2E7D32;
      color: white;
      padding: 20px 40px;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    main {
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    #donate {
      background-color: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    #donate h2 {
      color: #2E7D32;
      margin-bottom: 30px;
      font-size: 28px;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-weight: 700;
      color: #2E7D32;
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="number"],
    input[type="datetime-local"] {
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      width: 100%;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }

    .radio-group {
      display: flex;
      gap: 20px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: normal;
      color: #333;
    }

    button[type="submit"] {
      background-color: #FF8F00;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s, transform 0.3s;
    }

    button[type="submit"]:hover {
      background-color: #F57C00;
      transform: translateY(-2px);
    }

    footer {
      background-color: #2E7D32;
      color: white;
      text-align: center;
      padding: 30px 20px;
      margin-top: 40px;
    }

    #logo {
      margin-bottom: 20px;
    }

    #logo a {
      display: inline-block;
      margin: 0 10px;
    }

    #logo img {
      width: 32px;
      height: 32px;
      transition: transform 0.3s;
    }

    #logo img:hover {
      transform: scale(1.2);
    }

    @media (max-width: 600px) {
      main {
        padding: 20px;
      }
      
      #donate {
        padding: 30px 20px;
      }
      
      .radio-group {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <header>
    FoodLinker
  </header>

  <main>
    <section id="donate">
      <h2>Donate Food</h2>
      <form action="DonateServlet" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required />

        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="Pickup Location" required />

        <label>Veg / Non-Veg</label>
        <div class="radio-group">
          <label><input type="radio" name="type" value="veg" required> Veg</label>
          <label><input type="radio" name="type" value="nonveg" required> Non-Veg</label>
        </div>

        <label for="foodDetails">Food Description</label>
        <input type="text" id="foodDetails" name="foodDetails" placeholder="Food Description" required />

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" placeholder="Quantity (in servings)" required />

        <label for="pickupTime">Pick up Date and Time</label>
        <input type="datetime-local" id="pickupTime" name="pickupTime" required />

        <button type="submit">Submit Donation</button>
      </form>
    </section>
  </main>

  <footer>
    <div id="logo">
      <a href="#"><img src="1_Facebook_colored_svg_copy-256.webp" alt="Facebook"></a>
      <a href="#"><img src="1_Instagram_colored_svg_1-256.webp" alt="Instagram"></a>
      <a href="#"><img src="1_Twitter3_colored_svg-256.webp" alt="Twitter"></a>
      <a href="#"><img src="1_Youtube_colored_svg-256.webp" alt="YouTube"></a>
    </div>
    © 2025 FoodLinker. All rights reserved.
  </footer>

</body>
</html>
